name: C/C++ Ci with Pytest Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    
    - name: Set up CMake
      uses: jwlawrence/actions-setup-cmake@v1.0.1

    - name: Run autonomous pytest workflow
      run: |
        pytest -v -s